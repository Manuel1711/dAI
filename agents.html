<!doctype html>
<html>
<head>
  <meta charset='utf-8'/>
  <meta name='viewport' content='width=device-width, initial-scale=1'/>
  <title>ERC8004 Agents - List</title>
  <link rel='stylesheet' href='./assets/styles.css'/>
</head>
<body>
  <div class='container'>
    <div id='nav'></div>
    <h1>Agents List</h1>
    <div class='toolbar'>
      <input id='search' class='input' placeholder='Search by name, id, owner, category...'/>
      <select id='sort' class='input'>
        <option value='score'>Sort: Score (desc)</option>
        <option value='feedback'>Sort: Feedback count (desc)</option>
        <option value='recent'>Sort: Recent activity</option>
        <option value='name'>Sort: Name (A-Z)</option>
      </select>
    </div>
    <table class='table'>
      <thead><tr><th>Identity</th><th>Category</th><th>Feedback</th><th>Score v1</th><th>Last activity</th></tr></thead>
      <tbody id='agents-table'></tbody>
    </table>
  </div>
  <script src='./assets/app.js'></script>
  <script>renderAgents()</script>
</body>
</html>
